<ion-header class="os-header">
  <ion-toolbar lines="none">
    <div class="os-header-bar">

      <!-- ícone voltar -->
      <button class="os-back-btn" (click)="onBack()">
        <img src="../../assets/icon/topoRequest.svg" alt="Voltar" />
      </button>

      <!-- título -->
      <h1 class="os-title">Ordem de Serviço</h1>

      <!-- botão NOVA -->
      <button class="os-new-btn" (click)="goNovaOrdem()">
        NOVA
      </button>

    </div>
  </ion-toolbar>
</ion-header>


<ion-content class="os-content">
  <div class="os-page">

    <div class="os-card">

      <!-- CAMPOS -->
      <div class="os-field">
        <label class="os-label">Número OS</label>
        <ion-input class="os-input" [(ngModel)]="filtro.numeroOs"></ion-input>
      </div>

      <div class="os-field">
        <label class="os-label">Empreendimento</label>
        <app-autocomplete
          [lista]="empreendimentosLista"
          campoDescricao="descricao"
          (selecionado)="onEmpreendimentoSelecionado($event)">
        </app-autocomplete>
      </div>

      <div class="os-field">
        <label class="os-label">Equipamento</label>
        <app-autocomplete
          [lista]="equipamentosLista"
          campoDescricao="descricao"
          (selecionado)="onEquipamentoSelecionado($event)">
        </app-autocomplete>
      </div>

      <div class="os-field">
        <label class="os-label">Causa Intervenção</label>
        <app-autocomplete
          [lista]="causasLista"
          campoDescricao="descricao"
          (selecionado)="onCausaSelecionada($event)">
        </app-autocomplete>
      </div>

      <div class="os-field">
        <label class="os-label">Manutentor</label>
<app-autocomplete
  [lista]="manutentoresLista"
  placeholder=""
  campoDescricao="colaboradorNome"
  (selecionado)="onManutentorSelecionado($event)">
</app-autocomplete>
      </div>

      <!-- Status -->
<div class="os-field">
  <label class="os-label">Status</label>

  <app-autocomplete
    [lista]="statusLista"
    placeholder=""
    campoDescricao="descricao"
    (selecionado)="onStatusSelecionado($event)">
  </app-autocomplete>
</div>

<!-- CAMPOS DE DATA -->
<ng-container *ngFor="let c of camposData">

  <div class="os-field">
    <label class="os-label">{{ c.label }}</label>

    <div class="os-date-input">

      <!-- INPUT VISUAL -->
      <ion-input
        class="os-input os-date-display"
        readonly
        placeholder="dd/mm/aaaa"
        [value]="formatDate(filtro[c.key])"
        (click)="openCalendar($event, c.key)">
      </ion-input>

      <!-- LIMPAR DATA -->
      <button
        *ngIf="filtro[c.key]"
        type="button"
        class="os-date-clear"
        (click)="clearDate(c.key, $event)">
        ✕
      </button>

      <!-- CALENDÁRIO -->
      <button
        type="button"
        class="os-date-btn"
        (click)="openCalendar($event, c.key)">
        <ion-icon name="calendar-clear-outline"></ion-icon>
      </button>

    </div>
  </div>

</ng-container>



      <!-- BOTÃO -->
      <div class="os-actions">
        <ion-button expand="block" class="os-search-btn" (click)="pesquisar()">
          PESQUISAR
        </ion-button>
      </div>

      <!-- RESULTADOS -->
      <div *ngIf="resultados.length" class="os-resultados">

        <h2 class="os-result-title">Resultados</h2>

        <div class="os-result-card" *ngFor="let os of resultados">
          <div><strong>Nº OS:</strong> {{ os.osCod }}</div>
          <div><strong>Descrição:</strong> {{ os.osDescricao }}</div>
          <div><strong>Equipamento:</strong> {{ os.equipCod }} - {{ os.equipIndentificador }}</div>
        </div>

      </div>

    </div>
  </div>
</ion-content>
